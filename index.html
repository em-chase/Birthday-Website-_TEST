



<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Join the Birthday Club!</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
   <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
   <style>
       body {
           font-family: 'Fredoka', sans-serif;
           background: linear-gradient(135deg, #fef9c3 0%, #fff7ed 100%);
           min-height: 100vh;
       }
       .glass-card {
           background: rgba(255, 255, 255, 0.85);
           backdrop-filter: blur(12px);
           border: 1px solid rgba(255, 255, 255, 0.4);
       }
       .btn-festive {
           background: linear-gradient(90deg, #ff6b6b, #f06595);
           transition: all 0.3s ease;
       }
       .btn-festive:hover:not(:disabled) {
           transform: translateY(-2px);
           box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
       }
       .animate-pop {
           animation: pop 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48);
       }
       @keyframes pop {
           0% { transform: scale(0.8); opacity: 0; }
           100% { transform: scale(1); opacity: 1; }
       }
       .loader {
           border: 3px solid #f3f3f3;
           border-top: 3px solid #ffffff;
           border-radius: 50%;
           width: 18px;
           height: 18px;
           animation: spin 1s linear infinite;
       }
       @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
   </style>
</head>
<body class="flex items-center justify-center p-4">


   <div id="registration-card" class="max-w-md w-full glass-card rounded-3xl shadow-2xl overflow-hidden animate-pop">
       <div class="bg-yellow-400 p-8 text-center relative overflow-hidden">
           <div class="absolute top-0 left-0 w-16 h-16 bg-white/20 rounded-full -ml-8 -mt-8"></div>
           <div class="absolute bottom-0 right-0 w-24 h-24 bg-red-400/20 rounded-full -mr-12 -mb-12"></div>
           <div class="text-5xl mb-2 relative z-10">🎂</div>
           <h1 class="text-3xl font-bold text-gray-800 relative z-10">Birthday Club</h1>
           <p class="text-gray-700 mt-1 opacity-90 relative z-10">Join for a special surprise on your big day!</p>
       </div>


       <div class="p-8">
           <form id="birthdayForm" class="space-y-5">
               <div>
                   <label class="block text-sm font-semibold text-gray-700 mb-1">Your Name</label>
                   <input type="text" name="name" required placeholder="Full Name"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/50 outline-none focus:ring-2 focus:ring-red-400">
               </div>
               <div>
                   <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                   <input type="email" name="email" required placeholder="email@example.com"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/50 outline-none focus:ring-2 focus:ring-red-400">
               </div>
               <div>
                   <label class="block text-sm font-semibold text-gray-700 mb-1">Birthday</label>
                   <input type="date" name="dob" required
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/50 outline-none focus:ring-2 focus:ring-red-400">
               </div>
               <button type="submit" id="submitBtn" class="btn-festive w-full text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center space-x-3">
                   <span id="btnText">Count Me In!</span>
                   <div id="btnLoader" class="loader hidden"></div>
               </button>
           </form>
       </div>
   </div>


   <div id="success-message" class="hidden max-w-md w-full text-center animate-pop">
       <div class="glass-card rounded-3xl p-12 shadow-2xl">
           <div class="text-7xl mb-6">🎉</div>
           <h2 class="text-3xl font-bold text-gray-800">You're in!</h2>
           <p class="text-gray-600 mt-4 text-lg">Check your email for your welcome message!</p>
           <button onclick="window.location.reload()" class="mt-8 text-red-500 font-medium hover:underline">Register someone else</button>
       </div>
   </div>


   <script>
       /**
        * IMPORTANT: Paste your Web App URL below from Google Apps Script.
        */
       const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwN7yryjRll5Je4d1VObwzOJSjrdSQdomUi6nfuuX_7csJNHaM3G2lLJVNLsiy4nCf0pg/exec';


       document.getElementById('birthdayForm').addEventListener('submit', async (e) => {
           e.preventDefault();
           const btn = document.getElementById('submitBtn');
           const btnText = document.getElementById('btnText');
           const btnLoader = document.getElementById('btnLoader');


           if (SCRIPT_URL.includes('PASTE_YOUR_NEW')) {
               alert('Please set your Google Script URL in index.html!');
               return;
           }


           btn.disabled = true;
           btnText.textContent = "Sending Welcome Email...";
           btnLoader.classList.remove('hidden');


           // Format Date from YYYY-MM-DD to MM/DD/YYYY for the Google Sheet
           const rawDate = e.target.dob.value;
           const [year, month, day] = rawDate.split('-');
           const formattedDate = `${month}/${day}/${year}`;


           const formData = {
               name: e.target.name.value,
               email: e.target.email.value,
               dob: formattedDate
           };


           try {
               await fetch(SCRIPT_URL, {
                   method: 'POST',
                   mode: 'no-cors',
                   body: JSON.stringify(formData)
               });
              
               confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff6b6b', '#f06595', '#facc15'] });
               document.getElementById('registration-card').classList.add('hidden');
               document.getElementById('success-message').classList.remove('hidden');
           } catch (error) {
               alert('Error submitting form. Please check your connection and try again.');
               btn.disabled = false;
               btnText.textContent = "Count Me In!";
               btnLoader.classList.add('hidden');
           }
       });
   </script>
</body>
</html>
