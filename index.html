<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Birthday Club!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #fef9c3 0%, #fff7ed 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn-festive {
            background: linear-gradient(90deg, #ff6b6b, #f06595);
            transition: all 0.3s ease;
        }
        .btn-festive:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }
        .btn-festive:active {
            transform: scale(0.98);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff6b6b;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <!-- Hero & Form Container -->
    <main id="main-container" class="max-w-md w-full glass-card rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-700">
        <div class="bg-yellow-400 p-8 text-center relative overflow-hidden">
            <!-- Decorative SVG Circles -->
            <div class="absolute top-0 left-0 w-16 h-16 bg-white/20 rounded-full -ml-8 -mt-8"></div>
            <div class="absolute bottom-0 right-0 w-24 h-24 bg-red-400/20 rounded-full -mr-12 -mb-12"></div>
            
            <span class="text-4xl mb-2 block">🎂</span>
            <h1 class="text-3xl font-bold text-gray-800">Birthday Club</h1>
            <p class="text-gray-700 mt-2 opacity-90">Register to get a special surprise on your big day!</p>
        </div>

        <div class="p-8">
            <form id="registrationForm" class="space-y-5">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="name" name="name" required 
                        class="w-full px-4 py-3 rounded-xl border-gray-200 bg-white/50 focus:ring-2 focus:ring-red-400 focus:border-transparent outline-none transition" 
                        placeholder="e.g. Alex Smith">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" name="email" required 
                        class="w-full px-4 py-3 rounded-xl border-gray-200 bg-white/50 focus:ring-2 focus:ring-red-400 focus:border-transparent outline-none transition" 
                        placeholder="alex@example.com">
                </div>

                <div>
                    <label for="dob" class="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required 
                        class="w-full px-4 py-3 rounded-xl border-gray-200 bg-white/50 focus:ring-2 focus:ring-red-400 focus:border-transparent outline-none transition">
                </div>

                <button type="submit" id="submitBtn" class="btn-festive w-full py-4 rounded-xl text-white font-bold text-lg flex items-center justify-center space-x-2">
                    <span id="btnText">Join the Party!</span>
                    <div id="btnLoader" class="loader hidden"></div>
                </button>
            </form>

            <div id="statusMessage" class="mt-4 text-center text-sm font-medium hidden"></div>
        </div>
    </main>

    <!-- Success Screen (Initially Hidden) -->
    <section id="success-screen" class="hidden max-w-md w-full text-center space-y-6 animate-in slide-in-from-bottom-10 duration-500">
        <div class="glass-card rounded-3xl p-10 shadow-2xl">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-3xl font-bold text-gray-800">You're on the list!</h2>
            <p class="text-gray-600">We've saved your birthday. Keep an eye on your inbox for a celebratory surprise when your special day arrives!</p>
            <button onclick="window.location.reload()" class="mt-8 text-red-500 font-medium hover:underline">Register someone else</button>
        </div>
    </section>

    <script>
        // REPLACE THIS URL with your deployed Google Apps Script Web App URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJXS3nexBR9c2bQjeyHngqetLAJj6jTormTqjUcM--0IvPuS2fQTdtBEG-WPASba8pcg/exec'; 

        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const statusMsg = document.getElementById('statusMessage');
        const mainContainer = document.getElementById('main-container');
        const successScreen = document.getElementById('success-screen');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!SCRIPT_URL) {
                showStatus('Please set the SCRIPT_URL in the code first!', 'text-red-600');
                return;
            }

            // UI Loading State
            setLoading(true);
            statusMsg.classList.add('hidden');

            const formData = new FormData(form);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                dob: formData.get('dob')
            };

            try {
                // Send data to Google Apps Script
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Important for Google Apps Script cross-origin
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Note: with 'no-cors', we won't get a standard response object back, 
                // but if the fetch doesn't throw, it likely succeeded.
                handleSuccess();

            } catch (error) {
                console.error('Error:', error);
                showStatus('Oops! Something went wrong. Please try again.', 'text-red-600');
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                btnText.textContent = 'Joining...';
                btnLoader.classList.remove('hidden');
                submitBtn.classList.add('opacity-80');
            } else {
                btnText.textContent = 'Join the Party!';
                btnLoader.classList.add('hidden');
                submitBtn.classList.remove('opacity-80');
            }
        }

        function showStatus(text, colorClass) {
            statusMsg.textContent = text;
            statusMsg.className = `mt-4 text-center text-sm font-medium ${colorClass}`;
            statusMsg.classList.remove('hidden');
        }

        function handleSuccess() {
            // Confetti Blast!
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            // Switch Screens
            mainContainer.classList.add('hidden');
            successScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
